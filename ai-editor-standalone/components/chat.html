<div class="chat-section">
    <div class="chat-header">
      <div class="chat-title">Chat with AI</div>
      <button class="chat-toggle-btn" onclick="toggleActivityLog()" title="Toggle Activity Log">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <line x1="10" y1="9" x2="8" y2="9"/>
        </svg>
      </button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="activity-log" id="activityLog">
      <div class="activity-log-header">
        <span class="activity-log-title">Activity Log</span>
        <button class="activity-clear-btn" onclick="clearActivityLog()" title="Clear Log">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
      </div>
      <div class="activity-log-content" id="activityLogContent"></div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Describe your change..." rows="2"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
