<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standalone React Component Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; overflow: hidden; background: #1e1e1e; color: #d4d4d4; }
    .container { display: flex; height: 100vh; flex-direction: column; }
    .header { background: #252526; padding: 12px 20px; border-bottom: 1px solid #3e3e42; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 16px; font-weight: 600; color: #cccccc; }
    .run-button { background: #0e639c; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s; }
    .run-button:hover { background: #1177bb; }
    .main-content { display: flex; flex: 1; overflow: hidden; }
    .editor-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #3e3e42; background: #1e1e1e; }
    .editor-header { background: #2d2d30; padding: 8px 16px; font-size: 13px; color: #cccccc; border-bottom: 1px solid #3e3e42; }
    .editor { flex: 1; padding: 16px; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 14px; line-height: 1.6; background: #1e1e1e; color: #d4d4d4; border: none; outline: none; resize: none; overflow: auto; tab-size: 2; }
    .preview-panel { flex: 1; display: flex; flex-direction: column; background: #252526; }
    .preview-header { background: #2d2d30; padding: 8px 16px; font-size: 13px; color: #cccccc; border-bottom: 1px solid #3e3e42; }
    .preview-container { flex: 1; background: white; position: relative; }
    .preview-iframe { width: 100%; height: 100%; border: none; background: white; }
    .error-message { position: absolute; top: 0; left: 0; right: 0; background: #f44336; color: white; padding: 12px 16px; font-size: 13px; display: none; z-index: 10; }
    .error-message.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>React Component Renderer</h1>
      <button class="run-button" onclick="runCode()">Run Code</button>
    </div>
    <div class="main-content">
      <div class="editor-panel">
        <div class="editor-header">component.tsx</div>
        <textarea class="editor" id="codeEditor" spellcheck="false"></textarea>
      </div>
      <div class="preview-panel">
        <div class="preview-header">Preview</div>
        <div class="preview-container">
          <div class="error-message" id="errorMessage"></div>
          <iframe class="preview-iframe" id="previewFrame" sandbox="allow-scripts"></iframe>
        </div>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
